<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Select</title>

<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#101010;

overflow:hidden;

font-family:Arial;

}

/* TV */

#tv{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:96vw;
height:94vh;

padding:12px;

box-sizing:border-box;

border-radius:18px;

background:linear-gradient(
135deg,
#444,
#d8d8d8,
#777,
#222,
#999,
#555);

}

/* Menu */

#menu{

display:flex;

justify-content:space-evenly;

align-items:center;

width:100%;
height:100%;

background:#000;

border-radius:10px;

}

.card{

width:30%;

cursor:pointer;

transition:.25s;

}

.card:hover{

transform:scale(1.03);

}

.card img{

width:100%;

border-radius:10px;

display:block;

}

.title{

color:white;

font-size:22px;

padding-top:10px;

text-align:center;

}

/* Player */

#player{

display:none;

width:100%;

height:100%;

border-radius:10px;

overflow:hidden;

background:black;

}

iframe{

width:100%;
height:100%;

border:none;

}

#back{

position:absolute;

top:18px;

left:18px;

z-index:999;

display:none;

padding:10px 20px;

background:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

</style>

</head>

<body>

<div id="tv">

<button id="back" onclick="showMenu()">← Back</button>

<div id="menu">

<div class="card" onclick="playVideo('u0qVWu_DXcQ')">

<img src="https://img.youtube.com/vi/u0qVWu_DXcQ/maxresdefault.jpg">

<div class="title">Video 1</div>

</div>

<div class="card" onclick="playVideo('xkxcYXfS8Tk')">

<img src="https://img.youtube.com/vi/xkxcYXfS8Tk/maxresdefault.jpg">

<div class="title">Video 2</div>

</div>

<div class="card" onclick="playVideo('1dS5QbyIwko')">

<img src="https://img.youtube.com/vi/1dS5QbyIwko/maxresdefault.jpg">

<div class="title">Video 3</div>

</div>

</div>

<div id="player"></div>

</div>

<script>

function playVideo(id){

document.getElementById("menu").style.display="none";

document.getElementById("back").style.display="block";

document.getElementById("player").style.display="block";

document.getElementById("player").innerHTML=
'<iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1&controls=1&rel=0" allow="autoplay; fullscreen" allowfullscreen></iframe>';

}

function showMenu(){

document.getElementById("player").innerHTML="";

document.getElementById("player").style.display="none";

document.getElementById("back").style.display="none";

document.getElementById("menu").style.display="flex";

}

</script>

</body>
</html>
