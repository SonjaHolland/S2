<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Wall</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,Helvetica,sans-serif;
}

/* TV */

#tv{

    width:97vw;
    height:95vh;

    padding:18px;

    border-radius:24px;

    background:
    linear-gradient(
        135deg,
        #1b1b1b,
        #8e8e8e 15%,
        #e5e5e5 25%,
        #555 40%,
        #202020 55%,
        #d5d5d5 75%,
        #444 100%
    );

    box-shadow:
        0 0 30px rgba(0,0,0,.9),
        inset 0 0 8px rgba(255,255,255,.5);

    box-sizing:border-box;
}

/* Scherm */

#screen{

    position:relative;

    width:100%;
    height:100%;

    background:#000;

    border-radius:14px;

    overflow:hidden;

    display:flex;

    justify-content:space-evenly;

    align-items:center;

    gap:30px;

    padding:25px;

    box-sizing:border-box;
}

/* Glasreflectie */

#screen:before{

    content:"";

    position:absolute;

    top:0;
    left:-45%;

    width:70%;
    height:100%;

    background:linear-gradient(
        110deg,
        rgba(255,255,255,0),
        rgba(255,255,255,.10),
        rgba(255,255,255,0)
    );

    pointer-events:none;

    z-index:5;
}

/* Video's */

iframe{

    width:31%;
    height:82%;

    border:none;

    border-radius:12px;

    background:#000;

    box-shadow:
        0 0 20px rgba(0,0,0,.8);
}

</style>

</head>

<body>

<div id="tv">

<div id="screen">

<iframe
src="https://www.youtube.com/embed/u0qVWu_DXcQ"
allowfullscreen>
</iframe>

<iframe
src="https://www.youtube.com/embed/xkxcYXfS8Tk"
allowfullscreen>
</iframe>

<iframe
src="https://www.youtube.com/embed/1dS5QbyIwko"
allowfullscreen>
</iframe>

</div>

</div>

</body>
</html>
